version: "2"

linters:
  default: none
  enable:
    # correctness
    - errcheck        # unchecked errors — critical for DB/cache calls
    - govet           # go vet (shadowing, printf mismatches, etc.)
    - staticcheck     # comprehensive static analysis
    - ineffassign     # assigned but never used
    - unused          # unused code

    # security — mandatory for payment services
    - gosec           # common security issues (SQL injection, hardcoded creds, etc.)

    # style / maintainability
    - revive          # fast, configurable linter (replaces golint)
    - goimports       # import ordering
    - misspell        # typos in comments and strings
    - bodyclose       # HTTP response body not closed
    - noctx           # HTTP requests without context
    - exhaustive      # non-exhaustive switch on enums

    # complexity
    - cyclop          # cyclomatic complexity per function
    - funlen          # function length

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gosec:
    excludes:
      - G404  # math/rand — we use crypto/rand where it matters

  revive:
    rules:
      - name: exported
        disabled: false
      - name: error-return
        disabled: false
      - name: blank-imports
        disabled: false

  cyclop:
    max-complexity: 15

  funlen:
    lines: 80
    statements: 50

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # test files are exempt from some rules
    - path: "_test\\.go"
      linters:
        - funlen
        - cyclop
        - gosec

    # migration CLI is exempt from complexity rules
    - path: "cmd/api/migrate\\.go"
      linters:
        - funlen

  max-issues-per-linter: 50
  max-same-issues: 5
