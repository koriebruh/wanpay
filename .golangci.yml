linters:
  disable-all: true
  enable:
    # correctness
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # security — mandatory for payment services
    - gosec

    # style / maintainability
    - revive
    - goimports
    - misspell
    - bodyclose
    - noctx
    - exhaustive

    # complexity
    - cyclop
    - funlen

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gosec:
    excludes:
      - G404  # math/rand — we use crypto/rand where it matters

  revive:
    rules:
      - name: exported
        disabled: false
      - name: error-return
        disabled: false
      - name: blank-imports
        disabled: false

  cyclop:
    max-complexity: 15

  funlen:
    lines: 80
    statements: 50

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - funlen
        - cyclop
        - gosec

    - path: "cmd/api/migrate\\.go"
      linters:
        - funlen

  max-issues-per-linter: 50
  max-same-issues: 5
