host: localhost:8080
info:
  contact:
    email: support@wanpey.id
    name: Wanpey Support
  description: |-
    Payment gateway aggregator — VA, QRIS, and disbursement via Midtrans, Xendit, DOKU, iPaymu.

    ## Authentication
    Merchant endpoints (/v1/*): `X-API-Key` header with your API key (`wpay_live_*` or `wpay_test_*`).
    Admin endpoints (/admin/*): `Authorization: Bearer <access_token>` from POST /admin/login.

    ## Idempotency
    Payment and disbursement creation support `Idempotency-Key` header. Use unique key per request to safely retry.

    ## Webhook
    Wanpey signs outbound webhooks with `X-Wanpey-Signature` (HMAC-SHA256). Verify using your webhook secret.
  title: Wanpey Payment Gateway API
  version: "1.0"
paths:
  /admin/admins:
    get:
      description: 'Returns all admin accounts. Roles: super_admin only.'
      parameters:
      - description: 'Page (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Limit (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/wanpey_core_pkg_response.ListResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/wanpey_core_internal_usecase.AdminOutput'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
      security:
      - AdminAuth: []
      summary: List admin users
      tags:
      - Admin / Management
    post:
      consumes:
      - application/json
      description: 'Creates a new admin account. Roles: super_admin only.'
      parameters:
      - description: Admin details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wanpey_core_internal_usecase.CreateAdminInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/wanpey_core_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/wanpey_core_internal_usecase.AdminOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Create admin user
      tags:
      - Admin / Management
  /admin/admins/{id}/deactivate:
    patch:
      description: 'Deactivates an admin account. Cannot deactivate yourself. Roles:
        super_admin only.'
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/wanpey_core_pkg_response.SuccessResponse'
            - properties:
                data:
                  properties:
                    message:
                      type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
        "422":
          description: Cannot deactivate yourself
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Deactivate admin user
      tags:
      - Admin / Management
  /admin/disbursements:
    get:
      description: 'Returns paginated disbursements across all merchants. Roles: all
        admin roles.'
      parameters:
      - description: 'Page (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Limit (default: 20)'
        in: query
        name: limit
        type: integer
      - description: Filter by merchant ID
        in: query
        name: merchant_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by provider
        in: query
        name: provider
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start
        type: string
      - description: End date (RFC3339)
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/wanpey_core_pkg_response.ListResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/wanpey_core_internal_usecase.DisbursementOutput'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/wanpey_core_pkg_response.ErrorResponse'
      security:
      - AdminAuth: []
      summary: List all disbursements (admin)
      tags:
      - Admin / Disbursements
  /admin/disbursements/{id}:
    get:
      description: Returns disbursement detail by ID across all merchants.
      parameters:
      - description: Disbursement ID
