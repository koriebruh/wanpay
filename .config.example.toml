l[taskqueue]
enabled     = true
concurrency = 10      # max concurrent workers

[taskqueue.treasury]
check_cron                  = "*/15 * * * *"  # every 15 min — check all provider balances
topup_threshold_idr         = 10000000        # 10jt: trigger topup when provider balance < this
topup_amount_idr            = 50000000        # 50jt: topup amount when threshold hit
large_cashout_threshold_idr = 5000000         # 5jt: single cashout that triggers immediate topup check

# Asynqmon dashboard: http://localhost:8081 (requires make infra-up)

[app]
name        = "wanpey"
env         = "development"   # development | production
port        = "8080"
base_url    = "http://localhost:8080"
callback_url = "http://localhost:8080/webhook"

[app.shutdown]
timeout_seconds = 30   # detik tunggu in-flight request selesai sebelum force kill

[app.http]
request_timeout_seconds = 30
max_body_size           = "1M"
# production: ganti dengan domain frontend merchant — jangan pakai "*"
cors_allow_origins = ["http://localhost:3000", "http://localhost:5173"]

[database]
# App traffic: connect via PgBouncer (transaction pooling, port 6432)
dsn         = "postgres://postgres:postgres@localhost:6432/wanpey?sslmode=disable"
# Migrations: connect directly to Postgres (port 5432) — bypasses PgBouncer
# because golang-migrate uses advisory locks which PgBouncer transaction mode blocks.
migrate_dsn = "postgres://postgres:postgres@localhost:5432/wanpey?sslmode=disable"
max_open_conns            = 20
max_idle_conns            = 5
conn_max_lifetime_minutes = 5

[redis]
enabled  = true            # false = skip koneksi Redis, IsEnabled() return false
addr     = "localhost:6379"
password = ""
db       = 0

[logger]
level      = "debug"   # debug | info | warn | error
encoding   = "console" # console | json
output     = "stdout"

[provider.circuit_breaker]
max_requests         = 3   # max requests allowed in half-open state
interval_seconds     = 60  # rolling window for counting failures
timeout_seconds      = 30  # seconds to stay open before probing recovery
consecutive_failures = 5   # consecutive failures before opening

[provider.midtrans]
enabled       = true
server_key    = ""
client_key    = ""
is_production = false

[provider.xendit]
enabled       = true
secret_key    = ""
webhook_token = ""
callback_url  = ""

[provider.doku]
enabled    = false   # set true after configuring credentials and registering public key in DOKU dashboard
api_key    = ""
client_id  = ""
secret_key = ""
# RSA PKCS8 private key for B2B access token (SHA256withRSA).
# Generate key pair:
#   openssl genrsa -out private.key 2048
#   openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in private.key -out private_pkcs8.key
# Then upload the public key to DOKU Dashboard > Integration > API Keys > Public Key.
# Paste the contents of private_pkcs8.key here as a multi-line TOML string,
# OR set the DOKU_PRIVATE_KEY_PEM environment variable (takes precedence over this field).
# Using the env var is recommended in production so the key is never written to a config file.
private_key_pem = """
"""

[provider.ipaymu]
enabled       = false
api_key       = ""
va            = ""   # merchant VA number from iPaymu dashboard
is_production = false
notify_url    = ""   # webhook URL — iPaymu POSTs payment status here


[otel]
enabled      = true              # false = no-op tracer, tidak ada koneksi ke Jaeger
endpoint     = "localhost:4317"  # Jaeger OTLP gRPC
service_name = "wanpey"
sample_ratio = 1.0               # 1.0 = 100% dev; production: 0.1 (10%)

# Platform margin — Wanpey's revenue on top of each merchant's contracted fee.
# Deducted from merchant settlement (fee bearer is always merchant).
# Set enabled = false to pass through provider cost only (no platform markup).
[fee.margin]
enabled = false

[fee.margin.va]
type     = "flat"  # "flat" | "percentage"
flat_idr = 500     # IDR 500 per VA transaction
percentage = 0.0   # unused when type = "flat"

[fee.margin.qris]
type       = "percentage"
flat_idr   = 0
percentage = 0.3   # 0.3% per QRIS transaction (on top of merchant's QRIS fee)

[fee.margin.disbursement]
type     = "flat"
flat_idr = 1000    # IDR 1.000 per disbursement
percentage = 0.0
