[app]
name        = "wanpey"
env         = "development"   # development | production
port        = "8080"
base_url    = "http://localhost:8080"
callback_url = "http://localhost:8080/webhook"

[app.shutdown]
timeout_seconds = 30   # detik tunggu in-flight request selesai sebelum force kill

[app.http]
request_timeout_seconds = 30
max_body_size           = "1M"
# production: ganti dengan domain frontend merchant — jangan pakai "*"
cors_allow_origins = ["http://localhost:3000", "http://localhost:5173"]

[database]
# App traffic: connect via PgBouncer (transaction pooling, port 6432)
dsn         = "postgres://postgres:postgres@localhost:6432/wanpey?sslmode=disable"
# Migrations: connect directly to Postgres (port 5432) — bypasses PgBouncer
# because golang-migrate uses advisory locks which PgBouncer transaction mode blocks.
migrate_dsn = "postgres://postgres:postgres@localhost:5432/wanpey?sslmode=disable"
max_open_conns            = 20
max_idle_conns            = 5
conn_max_lifetime_minutes = 5

[redis]
enabled  = true            # false = skip koneksi Redis, IsEnabled() return false
addr     = "localhost:6379"
password = ""
db       = 0

[logger]
level      = "debug"   # debug | info | warn | error
encoding   = "console" # console | json
output     = "stdout"

[provider.midtrans]
server_key    = ""
client_key    = ""
is_production = false

[provider.xendit]
secret_key    = ""
webhook_token = ""

[provider.doku]
client_id  = ""
secret_key = ""

[otel]
enabled      = true              # false = no-op tracer, tidak ada koneksi ke Jaeger
endpoint     = "localhost:4317"  # Jaeger OTLP gRPC
service_name = "wanpey"
sample_ratio = 1.0               # 1.0 = 100% dev; production: 0.1 (10%)

# Platform margin — Wanpey's revenue on top of each merchant's contracted fee.
# Deducted from merchant settlement (fee bearer is always merchant).
# Set enabled = false to pass through provider cost only (no platform markup).
[fee.margin]
enabled = false

[fee.margin.va]
type     = "flat"  # "flat" | "percentage"
flat_idr = 500     # IDR 500 per VA transaction
percentage = 0.0   # unused when type = "flat"

[fee.margin.qris]
type       = "percentage"
flat_idr   = 0
percentage = 0.3   # 0.3% per QRIS transaction (on top of merchant's QRIS fee)

[fee.margin.disbursement]
type     = "flat"
flat_idr = 1000    # IDR 1.000 per disbursement
percentage = 0.0
