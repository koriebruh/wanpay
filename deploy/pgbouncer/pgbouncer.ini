[databases]
wanpey = host=postgres port=5432 dbname=wanpey

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

auth_type = md5
auth_file  = /etc/pgbouncer/userlist.txt

; transaction mode: connection released after each tx — optimal for autoscaling
pool_mode            = transaction
max_client_conn      = 1000
default_pool_size    = 25
min_pool_size        = 5
reserve_pool_size    = 5
reserve_pool_timeout = 3

server_idle_timeout  = 600
server_lifetime      = 3600
query_wait_timeout   = 15

log_connections    = 0
log_disconnections = 0
log_pooler_errors  = 1

admin_users = postgres
stats_users = postgres
