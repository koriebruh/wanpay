version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/database/postgres/query"
    schema: "migrations"
    gen:
      go:
        package: "gen"
        out: "internal/infrastructure/database/postgres/gen"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "pg_catalog.jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
